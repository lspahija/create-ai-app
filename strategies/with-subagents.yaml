description: Review code changes with specialized subagents

prompt:
  system: |
    You are a senior code reviewer. Be thorough but constructive.
    Focus on correctness, security, and maintainability.
  task: |
    Review the recent changes in this repository.
    Focus areas: $focus_areas

agent:
  model: claude-opus-4-6
  effort: max
  max_turns: 50
  timeout: 1800

subagents:
  - name: security-reviewer
    description: Checks for security vulnerabilities, injection risks, auth issues
    model: claude-sonnet-4-6
    prompt: Focus exclusively on security concerns.
  - name: test-reviewer
    description: Evaluates test coverage and test quality
    model: claude-sonnet-4-6
    prompt: Focus on test coverage gaps and test quality.
